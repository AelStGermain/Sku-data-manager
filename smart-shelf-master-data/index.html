<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Plataforma de Master Data para gestión centralizada de SKUs en supermercados con tecnología Smart Shelf.">
  <title>Smart Shelf — Master Data Platform</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSV Parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Excel parser -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════ -->
<div class="app-shell">

  <!-- ── SIDEBAR ─────────────────────────────── -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon">SS</div>
      <div class="brand-text">
        <span class="brand-name">Smart Shelf</span>
        <span class="brand-sub">Master Data</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <button class="nav-item" data-view="catalog" id="nav-catalog">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Catálogo</span>
      </button>
      <button class="nav-item" data-view="import" id="nav-import">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Importar</span>
      </button>
      <button class="nav-item" data-view="retailers" id="nav-retailers">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Retailers</span>
      </button>
    </nav>

    <!-- Retailer filters -->
    <div class="sidebar-filter">
      <p class="filter-label">Filtrar por retailer</p>
      <div id="sidebar-retailer-filters"><!-- Rendered by App.renderSidebar() --></div>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button class="reset-btn-small" id="reset-btn">↺ Resetear demo</button>
    </div>

  </aside><!-- /sidebar -->

  <!-- ── MAIN CONTENT ──────────────────────────── -->
  <main class="main-content">

    <!-- CATALOG VIEW -->
    <section id="view-catalog" class="view">
      <!-- Rendered by UICatalog.render() -->
    </section>

    <!-- IMPORT VIEW -->
    <section id="view-import" class="view">
      <!-- Rendered by UIImport.render() -->
    </section>

    <!-- RETAILERS VIEW -->
    <section id="view-retailers" class="view">
      <!-- Rendered by UIRetailers.render() -->
    </section>

  </main><!-- /main-content -->
</div><!-- /app-shell -->

<!-- ═══════════════════════════════════════════
     TECHNICAL SHEET MODAL
     ═══════════════════════════════════════════ -->
<div id="sheet-overlay" class="sheet-overlay hidden">
  <div class="sheet-modal" id="sheet-modal">
    <div id="sheet-content"><!-- Rendered by UISheet._render() --></div>
  </div>
</div>

<!-- Toast notifications -->
<div id="toast-container"></div>

<!-- ═══════════════════════════════════════════
     SCRIPTS  (dependency order)
     ═══════════════════════════════════════════ -->
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/importer.js"></script>
<script src="js/ui-catalog.js"></script>
<script src="js/ui-sheet.js"></script>
<script src="js/ui-import.js"></script>
<script src="js/ui-retailers.js"></script>
<script src="js/app.js"></script>

</body>
</html>
